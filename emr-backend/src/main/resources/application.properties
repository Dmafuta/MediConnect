# Datasource configuration for PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/mediconnect_iam_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Datasource configuration for SQL Server (uncomment and modify if needed)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=mediconnect_iam_db
# spring.datasource.username=sa
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Server port
server.port=8080

# JWT Configuration (replace with strong secret keys)
jwt.secret=your_jwt_secret_key_replace_with_a_strong_one_and_keep_it_secure
jwt.expiration=3600000 # 1 hour in milliseconds