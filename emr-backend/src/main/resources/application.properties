# Datasource configuration for PostgreSQL
# Set DB_URL, DB_USERNAME, DB_PASSWORD as environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mediconnect_iam_db}
spring.datasource.username=${DB_USERNAME:mac}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Datasource configuration for SQL Server (uncomment and modify if needed)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=mediconnect_iam_db
# spring.datasource.username=sa
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Flyway — manages schema creation and seed data
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Server port
server.port=8080

# JWT Configuration — set JWT_SECRET env var in production (min 32 chars)
jwt.secret=${JWT_SECRET:replace-this-with-a-secure-random-secret-key-min-32-chars}
# 1 hour in milliseconds
jwt.expiration=3600000

# CORS — set CORS_ALLOWED_ORIGINS env var in production (comma-separated)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}